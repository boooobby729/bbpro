<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Parallax - Boooooby Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1A1A1A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .parallax-container {
            position: relative;
            width: 348px;
            height: 546px;
            perspective: 1000px;
            cursor: pointer;
        }

        .parallax-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .parallax-layer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 从下到上：4是最底层，1是最顶层 */
        .layer-4 { z-index: 1; }
        .layer-3 { z-index: 2; }
        .layer-2 { z-index: 3; }
        .layer-1 { z-index: 4; }
    </style>
</head>
<body>
    <div class="parallax-container">
        <div class="parallax-layer layer-4" data-speed="0.5">
            <img src="layer4.png" alt="Layer 4 - 底层边框">
        </div>
        <div class="parallax-layer layer-3" data-speed="1.5">
            <img src="layer3.png" alt="Layer 3 - 麦当劳薯条袋">
        </div>
        <div class="parallax-layer layer-2" data-speed="2.5">
            <img src="layer2.png" alt="Layer 2 - 奶酪卡片">
        </div>
        <div class="parallax-layer layer-1" data-speed="4">
            <img src="layer1.png" alt="Layer 1 - 文字信息">
        </div>
    </div>

    <script>
        const container = document.querySelector('.parallax-container');
        const layers = document.querySelectorAll('.parallax-layer');

        document.addEventListener('mousemove', (e) => {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // 鼠标相对于屏幕中心的偏移（-1 到 1）
            const offsetX = (e.clientX - centerX) / centerX;
            const offsetY = (e.clientY - centerY) / centerY;

            layers.forEach(layer => {
                const speed = parseFloat(layer.dataset.speed);
                const x = offsetX * speed * 15; // 最大偏移像素
                const y = offsetY * speed * 10;

                layer.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // 鼠标离开窗口时回到原位
        document.addEventListener('mouseleave', () => {
            layers.forEach(layer => {
                layer.style.transition = 'transform 0.5s ease-out';
                layer.style.transform = 'translate(0px, 0px)';
                setTimeout(() => {
                    layer.style.transition = 'transform 0.1s ease-out';
                }, 500);
            });
        });
    </script>
</body>
</html>
